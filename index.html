    <title>Aus der Zeit gefallen</title>
    <meta name="description" content="Eine kleine Reise. Drei Minuten." />

    <meta property="og:url" content="https://floriandavidzeiser.github.io/aus-der-zeit-gefallen/" />
    <meta property="og:title" content="Aus der Zeit gefallen" />
    <meta property="og:description" content="Eine kleine Reise. Drei Minuten." />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="627" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Aus der Zeit gefallen. Alles fließt." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aus der Zeit gefallen" />
    <meta name="twitter:description" content="Eine kleine Reise. Drei Minuten." />

hin, den draußen niemand sieht. Die Runde bleibt liegen. Der Sohn, der sie gehen sollte, sucht sich etwas anderes. Die Stange mit dem Haken lehnt noch jahrelang in einem Schuppen. Bis keiner mehr weiß, wofür der Haken war."},{id:"knockerup",year:1890,place:"Manchester",worldEntryForm:"frage",worldEntry:"Die Fabriksirene heult über die Dächer und duldet keine Verspätung. Eine Uhr kostet mehr, als eine Woche Arbeit einbringt. Das Radio gibt es noch nicht. Wie also weckt man eine ganze Stadt voller Arbeiter auf die Minute?",profession:"Der Weckdienst",story:"Außer sonntags ist sie um drei auf den Beinen. Ein Rohr, eine Handvoll getrockneter Erbsen, und los durch die nassen Gassen. Sie schießt sie ans Glas, dass es klackt, bis oben einer ans Fenster tritt und nickt. Erst dann geht sie weiter, nicht eher. Sechs Pence die Woche. Der Alte drei Meilen weiter macht es mit einer Angelrute, aber ihre Erbsen treffen sicherer. Sie weckt die halbe Straße. Sie selbst weckt niemand. Ein gutes Geschäft, denkt sie, solange Menschen zur Schicht müssen.",aftermath:"Dann steht in den Schlafzimmern ein kleines Ding mit zwei Glocken obendrauf. Es rasselt von allein. Es kostet einmal, was sie in Wochen verdient. Und kostet dann nie wieder. Ihre Runde wird kürzer. Erst dieses Fenster, dann jenes. Niemand wartet mehr auf die Erbse. Am Ende ist sie eine der Letzten. Dann macht es keiner mehr."},{id:"switchboard",year:1930,place:"New York",worldEntryForm:"szene",worldEntry:"In den Wohnungen hängt ein neues Gerät an der Wand, aus Holz und Bakelit, und wer hineinspricht, kann eine Stimme vom anderen Ende der Stadt hören. Ein Wunder, das sich rasend verbreitet. Nur eines kann das Wunder nicht. Zwei Leitungen finden nie von allein zueinander.",profession:"Das Fräulein vom Amt",story:"Nummer bitte, sagt sie, hundertmal in der Stunde. Sie kennt keine Nummern, sie kennt Namen. Sie zieht den Stecker, sie verbindet zwei Menschen, sie hört den ersten Satz, sie zieht den nächsten. Schwarzes Kleid, kein Schmuck, an manchen Tagen rollt sie auf Rollschuhen ans Ende der Wand, damit es schneller geht. Durch ihre Hände läuft jedes Gespräch dieser Stadt. Ohne sie redet hier niemand mit niemandem.",aftermath:"An einem Mittwoch im Oktober, halb zwei am Nachmittag, legt jemand einen Hebel um. Von da an stecken sich die Gespräche selbst. Sie steht auf, nimmt ihren Mantel, geht. Die Wand aus Kabeln verstummt. Und wenn heute eine Stimme vom Band darum bittet, in der Leitung zu bleiben, ist es fast immer eine Frauenstimme. Mehr ist von ihr geblieben."},{id:"computer",year:1958,place:"Langley",worldEntryForm:"fakt",worldEntry:"Die Welt nach dem Krieg rechnet sich in die Zukunft. Düsenflugzeuge, Staudämme, bald der Griff nach dem Himmel. Jede Flugbahn, jede Brücke, jede Tabelle will berechnet sein, auf viele Stellen genau. Und es gibt nichts auf der Welt, das rechnet. Nur Menschen.",profession:"Der menschliche Computer",story:"Beruf, Computer. Werkzeug, Bleistift, Millimeterpapier, eine Rechenmaschine. Sie liest die Werte unter dem Mikroskop vom Graphen ab und trägt sie ein. Acht Stunden. Dieselbe Gleichung. Eine Flugbahn füllt sechs Notizbücher und dauert eine Woche. Ihre Zahlen entscheiden, ob die Rakete fliegt, und eine Zeit lang traut man ihnen mehr als der neuen Maschine im Nebenraum. Dann schreibt eine von ihnen das Programm für die Maschine. Den Namen Computer gibt sie damit ab.",aftermath:"Die Maschine im Nebenraum rechnet die Flugbahn in Stunden, nicht in Wochen. Sie ist genauer. Sie wird nicht müde. Sie hält nie inne. Der Saal leert sich, Tisch um Tisch. Was bleibt, ist das Wort. Computer, heute ein Gerät auf jedem Schreibtisch. Dass es einmal ein Mensch war, der so hieß, weiß kaum noch jemand."}],Xr={mark:"?",fallbackProfession:"deine Arbeit",todayLine:"Und heute. Deine Arbeit. Sie fühlt sich an, als wäre sie immer da gewesen. Als bliebe sie für immer."},g0="Auch der Laternenanzünder hielt seine Arbeit für selbstverständlich.",$2={again:"noch einmal"},jr={intro:"Vier Be
